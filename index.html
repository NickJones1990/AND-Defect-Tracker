<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AND Network — Defect Tracker</title>
<style>
:root {
  --dg:#215D5E; --mg:#00B48A; --lg:#EEF6E8;
  --gray:#666; --lgray:#D1D3D4; --red:#DC3545;
  --r:8px; --sh:0 2px 8px rgba(33,93,94,.12); --sh2:0 8px 32px rgba(33,93,94,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f0f4f3;color:#111;min-height:100vh}
#root{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--dg);color:#fff;padding:0 14px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-logo{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--mg);text-transform:uppercase;white-space:nowrap}
.hdr-title{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.bs{background:var(--mg);color:#fff}.bc{background:#4A90A4;color:#fff}
.btn-back{background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;padding:6px 10px;border-radius:6px;font-size:13px;white-space:nowrap}
.btn-back:hover{background:rgba(255,255,255,.25)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.bp{background:var(--mg);color:#fff}.bp:hover{background:#009e7a}
.bsec{background:#fff;color:var(--dg);border:1.5px solid var(--lgray)}.bsec:hover{border-color:var(--mg);color:var(--mg)}
.bd{background:var(--red);color:#fff}.bd:hover{background:#c82333}
.bsm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.page{flex:1;padding:14px;max-width:860px;width:100%;margin:0 auto}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dg);padding:20px}
.login-card{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:380px;box-shadow:var(--sh2);text-align:center}
.login-brand{font-size:12px;font-weight:700;letter-spacing:.15em;color:var(--mg);text-transform:uppercase;margin-bottom:6px}
.login-title{font-size:24px;font-weight:700;color:var(--dg);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--gray);margin-bottom:28px}
.lbtn{width:100%;padding:14px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .2s;margin-bottom:10px;text-align:left;display:flex;align-items:center;gap:12px}
.lbtn-ico{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.lbtn-info{display:flex;flex-direction:column}
.lbtn-label{font-weight:700;font-size:14px}
.lbtn-desc{font-weight:400;font-size:11px;opacity:.7;margin-top:1px}
.lbtn-staff{background:var(--lg);border-color:var(--dg);color:var(--dg)}.lbtn-staff:hover{background:var(--dg);color:#fff}
.lbtn-client{background:#EBF5FB;border-color:#4A90A4;color:#2C6E87}.lbtn-client:hover{background:#4A90A4;color:#fff}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:18px;font-weight:700;color:var(--dg)}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px}
.card+.card{margin-top:8px}
.pcard{display:flex;align-items:center;gap:12px;cursor:pointer;padding:14px;border-left:4px solid var(--mg);transition:background .15s}
.pcard:hover{background:var(--lg)}
.pico{width:38px;height:38px;background:var(--lg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.pinfo{flex:1;min-width:0}
.pname{font-weight:600;font-size:14px;color:var(--dg)}
.pmeta{font-size:12px;color:var(--gray);margin-top:2px}
.pcnt{font-size:12px;font-weight:600;color:var(--mg);background:var(--lg);padding:4px 10px;border-radius:12px;white-space:nowrap}
.dcard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:14px;cursor:pointer;transition:box-shadow .15s;border-left:4px solid var(--lgray);margin-bottom:8px}
.dcard:hover{box-shadow:var(--sh2)}
.dc-crit{border-left-color:var(--red)}.dc-maj{border-left-color:#FF6B00}.dc-min{border-left-color:var(--mg)}
.dcard-top{display:flex;align-items:flex-start;gap:10px}
.dcard-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--lgray);flex-shrink:0}
.dcard-nophoto{width:48px;height:48px;background:var(--lg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dcard-body{flex:1;min-width:0}
.dcard-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.dcard-id{font-size:11px;font-weight:700;color:var(--dg)}
.dcard-desc{font-size:13px;color:#111;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dcard-meta{font-size:11px;color:var(--gray)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;background:#fff}
thead th{background:var(--dg);color:#fff;padding:10px 12px;font-size:12px;font-weight:600;text-align:left;white-space:nowrap}
tbody td{padding:9px 12px;font-size:13px;border-bottom:1px solid var(--lg);vertical-align:middle}
tbody tr:hover td{background:#f8fffe;cursor:pointer}
tbody tr:last-child td{border-bottom:none}
.tid{font-weight:700;color:var(--dg);font-size:12px}
.tdesc{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tthumb{width:34px;height:34px;object-fit:cover;border-radius:4px;border:1px solid var(--lgray)}
.tnophoto{width:34px;height:34px;background:var(--lg);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.bmin{background:#FFF3CD;color:#856404}.bmaj{background:#FFE0CC;color:#7B3500}.bcrit{background:#FFCCCC;color:#7B0000}
.bopen{background:#FFCCCC;color:#7B0000}.binp{background:#FFF3CD;color:#856404}.bclosed{background:#D4EDDA;color:#155724}.bdisp{background:#E2D9F3;color:#4A1A7B}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:8px;padding:10px;text-align:center;border-left:3px solid var(--mg)}
.stat-n{font-size:20px;font-weight:700;color:var(--dg)}
.stat-l{font-size:11px;color:var(--gray);margin-top:1px}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fsel{padding:6px 10px;border:1.5px solid var(--lgray);border-radius:6px;font-family:inherit;font-size:12px;color:var(--dg);background:#fff;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--mg)}
.fact{border-color:var(--mg);background:var(--lg);font-weight:600}
.finp{padding:6px 10px;border:1.5px solid var(--lgray);border-radius:6px;font-family:inherit;font-size:12px;color:#111;background:#fff;width:140px}
.finp:focus{outline:none;border-color:var(--mg)}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--mg);color:#fff;border:none;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,180,138,.4);transition:all .2s;z-index:200}
.fab:hover{background:#009e7a;transform:scale(1.08)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end}
.ov.ctr{align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px}
.modal.ctr-m{border-radius:16px;max-width:540px;width:calc(100% - 32px);max-height:88vh}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--lg)}
.mtitle{font-size:16px;font-weight:700;color:var(--dg)}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;padding:2px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--dg);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.req{color:var(--red);margin-left:2px}
.fi,.fsel2,.fta{width:100%;padding:8px 11px;border:1.5px solid var(--lgray);border-radius:6px;font-family:inherit;font-size:13px;color:#111;background:#fff;transition:border-color .15s}
.fi:focus,.fsel2:focus,.fta:focus{outline:none;border-color:var(--mg)}
.fta{min-height:76px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.factions{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--lg)}
.pup{border:2px dashed var(--lgray);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .2s}
.pup:hover{border-color:var(--mg);background:var(--lg)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.pitem{position:relative;aspect-ratio:1}
.pitem img{width:100%;height:100%;object-fit:cover;border-radius:6px;border:1px solid var(--lgray)}
.prm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.pann{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);background:rgba(33,93,94,.85);color:#fff;border:none;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer;padding:2px 7px;white-space:nowrap}
.ann-wrap{position:fixed;inset:0;background:#000;z-index:500;display:flex;flex-direction:column}
.ann-tb{background:var(--dg);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ann-cw{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:8px}
canvas.ann-c{max-width:100%;max-height:100%;cursor:crosshair;touch-action:none}
.cob{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.3);cursor:pointer;flex-shrink:0}
.cob.act{border-color:#fff;transform:scale(1.2)}
.tab{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:4px;cursor:pointer;padding:4px 8px;font-size:11px}
.tab.act{background:var(--mg)}
.dl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray);margin-bottom:3px}
.dv{font-size:13px;color:#111}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dphotos{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
.dphotos img{width:100%;border-radius:8px;border:1px solid var(--lgray);cursor:pointer}
.upl-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:center;justify-content:center}
.upl-card{background:#fff;border-radius:12px;padding:28px 32px;text-align:center;min-width:220px}
.upl-t{font-size:15px;font-weight:600;color:var(--dg);margin-bottom:8px}
.upl-bar{height:6px;background:var(--lg);border-radius:3px;overflow:hidden;margin-top:8px}
.upl-prog{height:100%;background:var(--mg);border-radius:3px;transition:width .3s}
.tag-area{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1.5px solid var(--lgray);border-radius:6px;min-height:42px;cursor:text}
.tag{background:var(--lg);color:var(--dg);border-radius:4px;padding:2px 8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:3px}
.tag button{background:none;border:none;cursor:pointer;color:var(--gray);font-size:14px;line-height:1;padding:0 1px}
.tag-in{border:none;outline:none;font-family:inherit;font-size:13px;flex:1;min-width:80px}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.lb img{max-width:100%;max-height:90vh;border-radius:8px}
.lb-x{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:38px;height:38px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--dg);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:1000;box-shadow:var(--sh2);animation:fi .2s}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.empty{text-align:center;padding:40px 20px;color:var(--gray)}
.empty-ico{font-size:40px;margin-bottom:10px}
.empty-t{font-size:15px;font-weight:600;color:var(--dg);margin-bottom:6px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.frow{grid-template-columns:1fr}.dgrid{grid-template-columns:1fr}}
@media(min-width:700px){.ov{align-items:center;justify-content:center}.modal{border-radius:16px;max-width:580px;max-height:88vh;width:calc(100% - 32px)}}
</style>
